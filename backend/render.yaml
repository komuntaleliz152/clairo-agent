# Deploy on Render: https://render.com — New > Blueprint > connect repo, root: backend
services:
  - type: web
    name: clairo-research-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://clairo-research-agent.vercel.app
      - key: CLERK_ISSUER
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
